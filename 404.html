<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Legacy-path router. GitHub Pages serves this 404 page for any unmatched path. FarmFlow now
    // lives at farmflow.civildigital.co.uk, so anything under /farmflow/ is forwarded there with
    // the prefix stripped: shared listing links (/farmflow/listing/{id}) become /listing/?id={id},
    // and every other FarmFlow path maps across unchanged. Runs before render (location.replace,
    // no history entry, no flash). Other 404s fall through to the "page not found" content below.
    (function () {
      var FF = "https://farmflow.civildigital.co.uk";
      var m = location.pathname.match(/^\/farmflow\/listing\/(.+?)\/?$/);
      if (m && m[1]) {
        location.replace(FF + "/listing/?id=" + encodeURIComponent(decodeURIComponent(m[1])));
        return;
      }
      m = location.pathname.match(/^\/farmflow(\/.*)?$/);
      if (m) {
        location.replace(FF + (m[1] || "/") + location.search);
      }
    })();
  </script>
  <title>Page not found | Civil Digital</title>
  <meta name="description" content="The page you were looking for could not be found.">
