<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Deep-link router. GitHub Pages serves this 404 page for any unmatched path. Shared FarmFlow
    // listing links (/farmflow/listing/{id}) have no static file, so forward them to the listing
    // landing page carrying the id as a query param. Runs before render (location.replace, no history
    // entry, no flash). All other 404s fall through to the normal "page not found" content below.
    (function () {
      var m = location.pathname.match(/^\/farmflow\/listing\/(.+?)\/?$/);
      if (m && m[1]) {
        location.replace("/farmflow/listing/?id=" + encodeURIComponent(decodeURIComponent(m[1])));
      }
    })();
  </script>
  <title>Page not found | Civil Digital</title>
  <meta name="description" content="The page you were looking for could not be found.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="/" aria-label="Civil Digital home">
        <img class="brand__mark" src="assets/brand/CivilDigitalIcon.svg" alt="" aria-hidden="true">
        <span class="brand__text">Civil Digital<small>Practical digital delivery</small></span>
      </a>
      <ul class="nav__links" id="primary-nav">
        <li><a href="/">Home</a></li>
        <li><a href="services/index.html">Services</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </header>
  <main id="main">
    <section class="section text-center">
      <div class="container">
        <p class="eyebrow">Error 404</p>
        <h1>We couldn't find that page</h1>
        <p style="margin:var(--sp-4) auto var(--sp-6)">The page may have moved or never existed. Let's get you back on track.</p>
        <p><a class="btn btn--primary" href="/">Back to home</a> <a class="btn btn--secondary" href="contact.html">Contact us</a></p>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom" style="border:0;justify-content:center">
        <p>&copy; <span id="year">2026</span> Civil Digital. All rights reserved.</p>
      </div>
    </div>
  </footer>
  <script src="assets/js/main.js"></script>
</body>
</html>
